<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD ADMIN | HOOPERS VIBES S2</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --orange-hoop: #ff4500;
            --black-asphalt: #0f0f0f;
            --dark-gray: #1a1a1a;
            --white: #ffffff;
            --sidebar-width: 250px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: var(--black-asphalt); color: var(--white); display: flex; min-height: 100vh; }

        /* Login Overlay */
        #login-overlay {
            position: fixed; inset: 0; background: var(--black-asphalt);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .login-card {
            background: var(--dark-gray); padding: 50px; border: 2px solid var(--orange-hoop);
            text-align: center; width: 90%; max-width: 400px;
        }
        .login-card h1 { font-family: 'Bebas Neue'; font-size: 3rem; color: var(--orange-hoop); margin-bottom: 20px; }
        input[type="password"] {
            width: 100%; padding: 15px; background: #222; border: 1px solid #333; color: white; margin-bottom: 20px;
        }

        /* Sidebar - Glissant */
        .sidebar {
            width: var(--sidebar-width); 
            height: 100vh; 
            background: #000;
            padding: 30px 20px; 
            border-right: 1px solid #333; 
            position: fixed;
            left: 0;
            top: 0;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar h2 { font-family: 'Bebas Neue'; color: var(--orange-hoop); margin-bottom: 40px; font-size: 2rem; }
        .nav-item {
            padding: 15px; color: #aaa; text-decoration: none; display: block;
            font-family: 'Bebas Neue'; font-size: 1.2rem; transition: 0.3s;
        }
        .nav-item:hover, .nav-item.active { color: white; background: var(--orange-hoop); }

        /* Bouton pour ouvrir/fermer le menu */
        .menu-toggle {
            position: fixed;
            left: 20px;
            top: 20px;
            z-index: 999;
            background: var(--orange-hoop);
            border: none;
            color: white;
            padding: 12px 16px;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 5px;
            font-family: 'Bebas Neue';
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
        }

        .menu-toggle:hover {
            background: #ff6b1a;
            transform: scale(1.1);
        }

        /* Overlay semi-transparent quand le menu est ouvert */
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            z-index: 998;
        }

        .sidebar-overlay.active {
            display: block;
        }

        /* Main Content */
        .main-content { 
            flex: 1; 
            padding: 80px 40px 40px 40px; 
            width: 100%;
            overflow-x: hidden;
        }

        .header-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; flex-wrap: wrap; gap: 20px; }
        .header-main h1 { font-family: 'Bebas Neue'; font-size: 3rem; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card {
            background: var(--dark-gray); padding: 25px; border-radius: 5px;
            border-bottom: 3px solid var(--orange-hoop);
        }
        .stat-card h3 { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        .stat-card p { font-family: 'Bebas Neue'; font-size: 2.5rem; color: var(--orange-hoop); }

        /* Table Section - FIXED SCROLLING HERE */
        .table-wrapper {
            width: 100%;
            overflow-x: auto; /* Active le défilement horizontal */
            background: var(--dark-gray);
            border-radius: 5px;
            -webkit-overflow-scrolling: touch; /* Défilement fluide sur iOS */
            margin-top: 20px;
            border: 1px solid #333;
        }

        .table-container { 
            min-width: 800px; /* Force une largeur minimale pour le tableau sur petit écran */
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #222; padding: 15px; text-align: left; font-family: 'Bebas Neue'; color: var(--orange-hoop); white-space: nowrap; }
        td { padding: 15px; border-bottom: 1px solid #222; font-size: 0.9rem; }
        tr:hover { background: #222; }

        /* Badges */
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; white-space: nowrap; }
        .badge-player { background: #3498db; color: white; }
        .badge-guest { background: #9b59b6; color: white; }
        .badge-paid { background: #2ecc71; color: white; }
        .badge-unpaid { background: #e67e22; color: white; }

        /* Actions */
        .btn {
            padding: 8px 15px; border: none; cursor: pointer; font-family: 'Bebas Neue';
            font-size: 1rem; border-radius: 3px; margin-right: 5px; transition: 0.3s;
            white-space: nowrap;
        }
        .btn-validate { background: #2ecc71; color: white; }
        .btn-delete { background: #e74c3c; color: white; }
        .btn-export { background: #f39c12; color: white; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        #loading {
            position: fixed; top: 20px; right: 20px; background: var(--orange-hoop);
            padding: 10px 20px; display: none; z-index: 3000;
        }

        /* Responsive - Ajustement pour petits écrans */
        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .main-content { padding: 80px 20px 20px 20px; }
            .header-main h1 { font-size: 2.2rem; }
            .menu-toggle { left: 10px; top: 10px; }
        }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: 1fr; }
            .header-main h1 { font-size: 1.8rem; text-align: center; width: 100%; }
            .header-main div { display: flex; justify-content: center; width: 100%; }
            .btn { padding: 10px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h1>ACCÈS ADMIN</h1>
            <input type="password" id="admin-pass" placeholder="Mot de passe administrateur">
            <button class="btn btn-validate" style="width: 100%; padding: 15px;" onclick="checkAuth()">ENTRER DANS L'ARÈNE</button>
        </div>
    </div>

    <div id="loading">OPÉRATION EN COURS...</div>

    <!-- Bouton pour ouvrir/fermer le menu -->
    <button class="menu-toggle" onclick="toggleSidebar()" title="Menu">☰</button>

    <!-- Overlay semi-transparent -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <h2>HOOPERS VIBES</h2>
        <a href="#" class="nav-item active">TABLEAU DE BORD</a>
        <a href="scanner.html" class="nav-item">OUVRIR SCANNER</a>
        <a href="index.html" class="nav-item">RETOUR AU SITE</a>
        <div style="position: absolute; bottom: 30px; left: 20px;">
            <button class="btn btn-delete" onclick="logout()">DÉCONNEXION</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="header-main">
            <h1>DASHBOARD ORGANISATEUR</h1>
            <div>
                <button class="btn btn-export" onclick="loadData()">ACTUALISER</button>
                <button class="btn btn-export" onclick="exportPDF()">EXPORTER PDF</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>TOTAL INSCRITS</h3>
                <p id="stat-total">0</p>
            </div>
            <div class="stat-card">
                <h3>BASKETTEURS</h3>
                <p id="stat-players">0</p>
            </div>
            <div class="stat-card">
                <h3>VISITEURS</h3>
                <p id="stat-guests">0</p>
            </div>
            <div class="stat-card">
                <h3>CA ESTIMÉ (FCFA)</h3>
                <p id="stat-ca">0</p>
            </div>
        </div>

        <!-- Wrapper pour le défilement horizontal -->
        <div class="table-wrapper">
            <div class="table-container">
                <table id="admin-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Participant / Équipe</th>
                            <th>Type</th>
                            <th>Détails / Compétition</th>
                            <th>Paiement</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Données chargées dynamiquement -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxI9CBZ0kuwwDB28FrX48J8o5VJLVRYZjuxH_Qb8EsFXegAlp1Tsxl2ChXOYBzUCP5l/exec";
        let rawData = [];

        // Gestion du menu glissant
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }

        // Fermer le menu quand on clique sur un lien
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', closeSidebar);
        });

        // Fermer le menu avec la touche Échap
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeSidebar();
        });

        function checkAuth() {
            const pass = document.getElementById('admin-pass').value;
            sessionStorage.setItem('hv_admin_key', pass);
            loadData();
        }

        function logout() {
            sessionStorage.removeItem('hv_admin_key');
            location.reload();
        }

        async function loadData() {
            const key = sessionStorage.getItem('hv_admin_key');
            if (!key) return;

            showLoading(true);
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getData&key=${key}`);
                const result = await res.json();

                if (result.status === "success") {
                    document.getElementById('login-overlay').style.display = 'none';
                    rawData = result.data;
                    renderDashboard(result.data);
                } else {
                    alert("Accès refusé.");
                    sessionStorage.removeItem('hv_admin_key');
                }
            } catch (e) {
                alert("Erreur de connexion.");
            }
            showLoading(false);
        }

        function renderDashboard(data) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            let ca = 0;
            let players = 0;
            let guests = 0;

            data.forEach(item => {
                if (item.type === 'player') players++; else guests++;
                if (item.paid) ca += parseInt(item.montant || 0);

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.timestamp.split('T')[0]}</td>
                    <td>
                        <strong>${item.nom}</strong><br>
                        <small>${item.phone}</small>
                    </td>
                    <td><span class="badge ${item.type === 'player' ? 'badge-player' : 'badge-guest'}">${item.type.toUpperCase()}</span></td>
                    <td>
                        ${item.competition || item.passtype}<br>
                        <small>${item.categorie || ''} ${item.poste || ''}</small>
                    </td>
                    <td>
                        <span class="badge ${item.paid ? 'badge-paid' : 'badge-unpaid'}">${item.paid ? 'VALIDÉ' : 'EN ATTENTE'}</span><br>
                        <small>${item.montant} FCFA</small>
                    </td>
                    <td>
                        ${!item.paid ? `<button class="btn btn-validate" onclick="validatePayment('${item.uuid}')">VALIDER</button>` : ''}
                        <button class="btn btn-delete" onclick="deleteEntry('${item.uuid}')">🗑️</button>
                    </td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('stat-total').innerText = data.length;
            document.getElementById('stat-players').innerText = players;
            document.getElementById('stat-guests').innerText = guests;
            document.getElementById('stat-ca').innerText = ca.toLocaleString();
        }

        async function validatePayment(uuid) {
            if (!confirm("Confirmer le paiement et envoyer le ticket par email ?")) return;
            showLoading(true);
            const key = sessionStorage.getItem('hv_admin_key');
            try {
                const res = await fetch(`${SCRIPT_URL}?action=sendTicket&uuid=${uuid}&key=${key}`);
                const result = await res.json();
                alert(result.message);
                loadData();
            } catch (e) { alert("Erreur."); }
            showLoading(false);
        }

        async function deleteEntry(uuid) {
            if (!confirm("Supprimer cette inscription ?")) return;
            showLoading(true);
            const key = sessionStorage.getItem('hv_admin_key');
            try {
                await fetch(`${SCRIPT_URL}?action=delete&uuid=${uuid}&key=${key}`);
                loadData();
            } catch (e) { alert("Erreur."); }
            showLoading(false);
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.text("LISTE DES PARTICIPANTS - HOOPERS VIBES S2", 14, 15);
            
            const rows = rawData.map(i => [
                i.timestamp, i.nom, i.type, i.competition || i.passtype, i.phone, i.montant, i.paid ? 'OUI' : 'NON'
            ]);

            doc.autoTable({
                head: [['Date', 'Nom', 'Type', 'Détails', 'Tel', 'Montant', 'Payé']],
                body: rows,
                startY: 20
            });
            doc.save("hoopers_vibes_s2_export.pdf");
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
    </script>
</body>
</html>
